# FunQA数据集训练配置文件

# 数据集配置
dataset:
  # json_file: "./PATH_TO_LOCAL_RESOURCE"
  json_file: "./PATH_TO_LOCAL_RESOURCE"
  video_dir: "./PATH_TO_LOCAL_RESOURCE"            # 视频目录路径（train是原始视频，train_compressed是压缩后的视频）
  use_original_video: true                # 是否使用原始视频
  # video_fps: 3.0                           # 视频帧率 貌似没有用
  num_frames: 3                          # 每个视频采样的帧数，-1表示使用所有帧
  image_size: 224                          # 图像大小
  batch_size: 4                            # 批处理大小
  shuffle: true                            # 随机打乱数据
  num_workers: 4                           # 数据加载线程数

# # 模型配置
# model:
#   original_model_id: "./PATH_TO_LOCAL_RESOURCE"
#   fine_tuned_model_id: "./PATH_TO_LOCAL_RESOURCE"
#   model_type: "LlavaNextVideo"
#   torch_dtype: "float16"
#   low_cpu_mem_usage: true

# api配置
api:
  # api_key: "${OPENROUTER_API_KEY}"
  api_key: "${OPENROUTER_API_KEY}"
  # api_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
  api_url: "https://openrouter.ai/api/v1/chat/completions"
  model_name: "qwen/qwen2.5-vl-72b-instruct"  # 更改为支持logprobs的OpenAI模型 qwen/qwen2.5-vl-72b-instruct,qwen/qwen-vl-max ,openai/gpt-4o-2024-11-20
  # 阿里云请调用qwen-vl-max
# 专家(Agent)配置
experts:
  config_file: "configs/FunQA_expert_Choice_debate.yaml"  # 引用专家配置文件

# 评估指标
metrics:
  use_bleu: true
  use_rouge: true
  use_bert_score: false  # 测试阶段可以禁用BERTScore以提高速度
  bert_model: "bert-base-chinese"

# 训练配置
training:
  learning_rate: 5e-5
  weight_decay: 0.01
  max_epochs: 2       # 仅运行两个epoch作为测试
  save_interval: 1    # 每个epoch保存一次
  evaluation_interval: 1
  checkpoint_dir: "checkpoints/funqa_test"  # 使用特定目录保存检查点
  log_dir: "logs/funqa_test"               # 使用特定目录保存日志 
  use_debate: false    # 启用辩论功能

# 辩论功能配置
debate:
  max_rounds: 3
  convergence_threshold: 0.85
  min_quality_improvement: 0.05
 
